<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="Stylesheet"/>

     <style>
       
        .container{
            justify-content: center;
            width: 50%;
        }
         .hidden{
            display: none;
        }
        
     </style>

</head>
<body>

    <header>
      <nav class="navbar navbar-dark bg-dark">
        <div class="container d-flex flex-column align-items-center text-center py-3">
            <div class="h4 pb-2 mb-4 text-light border-bottom border-secondary">
                <h1>Log in</h1>
            </div>
            <span class="navbar-text">Don't have have an account? </span>
            <span class="navbar-text">Press register to see our green delights!</span>
        </div>
        </nav>

    </header>

    <br><br><br><br>

    <body>

        <div class="container">
            <form>
                <div class="form-group">
                    <label for="exampleInputEmail1">Email address</label>
                     <input type="email" class="form-control" id="LogInEmail" aria-describedby="emailHelp" placeholder="Enter email">
                    <small id="emailHelp" class="form-text text-muted ">We'll never share your email with anyone else.</small>
                </div>

                <div class="form-group">
                    <label for="exampleInputPassword1">Password</label>
                    <input type="password" class="form-control" id="LogInPass" placeholder="Password">
                </div>
                <br>

                <button type="submit" class="btn btn-dark" onclick="LogIn()">Log in</button>
                <a href="register.html" class="btn btn-dark">Register</a>
            </form>
        </div>


    </body>


    <script>

        window.onload =function(){
            let currentuser = localStorage.getItem("currentuser");
            if(currentuser){
                window.location.href = "index.html";
            }
            else{
                getElementById("Invalid credentials").textContent = "Cannot Log in. Invalid Password or Email" ;
                window.location.href = "logIn.html";
            }
        }

        function LogIn(){
             let usen = document.getElementById("LogInEmail").value;
            let pass = document.getElementById("LogInPass").value;

            let storageuser = JSON.parse(localStorage.getItem("user"));
            if(!storageuser){
                alert("No user register");
                return;
            }

            if(usen === storageuser.username && pass === storageuser.password){
                localStorage.setItem("currentuser",usen);
                window.location.href = "index.html";
            }else{
                 getElementById("Invalid credentials").textContent = "Cannot Log in. Invalid Password or Email" ;
                window.location.href = "logIn.html";
            }


        }
          function logout(){
            localStorage.removeItem("currentuser");
             window.location.href = "logIn.html";
        }






    </script>




    
</body>
</html>
