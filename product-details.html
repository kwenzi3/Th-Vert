    <body>

    <br>

        <div class="card text-center">
        
        <div class="card-body card-body-dark bg-dark">

    <script>

        const products = [
            {
                id: "r1",
                name: "Traditional Matcha",
                price:5.99,
                description: "Pure, high quality matcha with a bold taste",
                image:"/products/plain.jpeg",

            },
                 {
                id: "r2",
                name: "Lavender Matcha",
                price:6.99,
                description: "Floral lavender meets premium matcha for a calming and aromatic experience",
                image:"/products/lavander.jpeg",

            },
                 {
                id: "r3",
                name: "Banana Matcha",
                price:6.67,
                description: "Smooth matcha blended with sweet banana for a creamy, refreshing treat",
                image:"/products/banan.jpeg",

            },
                 {
                id: "r4",
                name: "Sea Salt Foam Matcha",
                price:6.60,
                description: "Creamy matcha topped with a hint of savory sea salt foam",
                image:"/products/seasaltfoam.jpeg",

            },
                 {
                id: "r5",
                name: "Strawberry Matcha",
                price:6.67,
                description: "Fresh strawberry sweetness layered with earthy matcha for a vibrant fusion",
                image:"/products/strawberry.jpeg",

            },
                 {
                id: "r6",
                name: "Sweet Foam Matcha",
                price:6.60,
                description: "Light and creamy sweet foam topping that adds a smooth finish",
                image:"/products/plain foam.jpeg",

            },
                 {
                id: "r7",
                name: "Dubai Chocolate Matcha",
                price:3.37,
                description: "Rich matcha paired with luxurious chocolate-inspired flavors",
                image:"/products/chocolate.jpeg",

            },
            {
                id: "r8",
                name: "Cookie Matcha",
                price:3.66,
                description: "Earthy matcha mixed with cookie crumble for a dessert drink",
                image:"/products/cookies.jpeg",

            },
                 {
                id: "r9",
                name: "Macaroon Matcha",
                price:3.66,
                description: "Delicate matcha infused with sweet macaroon notes",
                image:"/products/macaroon.jpeg",

            },
                 {
                id: "r10",
                name: "Matcha Powder",
                price:30.00,
                description: "Pure, high quality matcha with a bold taste",
                image:"/products/powder.jpeg",

            },
                 {
                id: "r11",
                name: "Matcha Set",
                price:50.99,
                description: "A curated selection of signature matcha drinks",
                image:"/products/matcha.jpeg",

            },

        ]


        const id = localStorage.getItem("ChosenOne");
        const product = products.find(p =>p.id === id);
        const container = document.getElementById("product-details");

        if(!product)
        {
            container.innerHTML = "No product selected";
        }
        else
        {
            container.innerHTML = `     
            <div class="card mx-auto" style="width: 25rem;">
                <img src="${product.image}" class="card-img-top">

                <div class="card-body">
                    <h3>${product.name}</h3>
                    <p>${product.description}</p>
                    <h4>${product.price}$</h4>

                    
                    <button type="button" class="btn btn-outline-dark" onclick="minus('${product.id}')">-</button>
                    <button type="button" class="btn btn-outline-dark" id="${product.id}" disabled>0</button>
                    <button type="button" class="btn btn-outline-dark" onclick="add('${product.id}')">+</button><br><br>

                    <button class="btn btn-dark" onclick="addtocart('${product.id}')">
                    Add to Cart </button> 
                 </div>
            </div>


            `;

        }

         function add(id){
        let result = document.getElementById(id);
        let num = parseInt(result.innerText);
        
        result.innerText = num +1;

    }
    function minus(id){

        let result = document.getElementById(id);
        let num = parseInt(result.innerText);
        
        if(num >0)
        {
             result.innerText = num - 1;
        }
        
    }

    function addtocart(name, price, id)
    {
        let quantity =parseInt(document.getElementById(id).innerText) || 0;

        if(quantity === 0)
        {
            alert("Please select quantity");
            return;

        }

        const cart = JSON.parse(localStorage.getItem("cart") || "[]");

        let exist = cart.find(item=> item.name === name);
        if(exist)
        {
            exist.quantity+=quantity;
        }
        else
        {
            cart.push({
                id: product.id,
                name: product.name,
                price: product.price,
                quantity: quantity

            });
        }

        localStorage.setItem("cart",JSON.stringify(cart));
        alert("Item added to your cart!");

        document.getElementById(id).innerText = 0;
        
    }

    </script>




</body>
